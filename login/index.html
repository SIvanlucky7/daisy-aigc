<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 - 雏菊论文</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=20260617-supabase-auth" />
    <script src="/icons.js"></script>
  </head>
  <body data-auth-page="login">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="daisy-logo" aria-hidden="true">
          <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span>
          <span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="core"></span>
        </span>
        <span>雏菊论文</span>
      </a>
      <nav class="nav">
        <a href="/">在线处理</a>
        <a class="active" href="/login">登录</a>
        <a href="/register">注册</a>
      </nav>
    </header>
    <main class="auth-page">
      <section class="auth-shell">
        <div class="auth-copy">
          <span class="hero-badge">邮箱账号登录</span>
          <h1>登录后继续处理文稿</h1>
          <p>余额、订单、下载结果和 API Key 都会跟随当前邮箱账号保存。</p>
        </div>
        <form class="auth-card-page" data-auth-form novalidate>
          <h2>登录账号</h2>
          <p>请输入邮箱和密码。</p>
          <div class="auth-alert" data-auth-message hidden></div>
          <label class="auth-field">
            <span>邮箱</span>
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" />
          </label>
          <label class="auth-field">
            <span>密码</span>
            <input name="password" type="password" autocomplete="current-password" placeholder="至少 8 位" />
          </label>
          <button class="auth-submit" data-auth-submit type="submit">登录</button>
          <div class="auth-foot-links">
            <a data-auth-link href="/forgot-password">忘记密码？</a>
            <a data-auth-link href="/register">注册新账号</a>
          </div>
        </form>
      </section>
    </main>
    <script src="/vendor/supabase.js?v=20260617"></script>
    <script type="module" src="/supabase-auth.js?v=20260617-local-auth"></script>
    <script type="module" src="/auth-pages.js?v=20260617-redirect-fix"></script>
  </body>
</html>
