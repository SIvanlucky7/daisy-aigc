<!doctype html>
<html lang="zh-CN">
  <head>

  <body data-auth-page="dashboard">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="daisy-logo" aria-hidden="true">
          <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span>

        </span>

    <main class="auth-page">
      <section class="dashboard-shell">
        <div class="auth-alert" data-auth-message hidden></div>

            <span class="hero-badge">用户中心</span>

          </div>
          <dl class="dashboard-info">
            <div>
              <dt>当前登录邮箱</dt>
              <dd data-dashboard-email>读取中...</dd>
            </div>
            <div>
              <dt>用户 ID</dt>
              <dd data-dashboard-id>读取中...</dd>
            </div>
            <div>
              <dt>账号权限</dt>
              <dd data-dashboard-role>读取中...</dd>
            </div>
          </dl>
          <div class="dashboard-actions">
            <a class="secondary-action" href="/">返回工作台</a>
            <a class="secondary-action dashboard-admin-link" data-admin-link href="/admin.html" hidden>进入后台</a>
            <button class="auth-submit" data-logout type="button">退出登录</button>
          </div>
        </article>
      </section>
    </main>
    <script src="/vendor/supabase.js?v=20260617"></script>
    <script type="module" src="/supabase-auth.js?v=20260618-local-first"></script>
