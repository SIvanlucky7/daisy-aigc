<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>找回密码 - 雏菊论文</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css?v=20260617-supabase-auth" />
    <script src="/icons.js"></script>
  </head>
  <body data-auth-page="forgot-password">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="daisy-logo" aria-hidden="true">
          <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span>
          <span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="core"></span>
        </span>
        <span>雏菊论文</span>
      </a>
      <nav class="nav">
        <a href="/">在线处理</a>
        <a href="/login">登录</a>
      </nav>
    </header>
    <main class="auth-page">
      <section class="auth-shell">
        <div class="auth-copy">
          <span class="hero-badge">找回密码</span>
          <h1>通过邮箱重置密码</h1>
          <p>输入注册邮箱后，系统会发送一封重置密码邮件。</p>
        </div>
        <form class="auth-card-page" data-auth-form novalidate>
          <h2>发送重置邮件</h2>
          <p>请填写你的注册邮箱。</p>
          <div class="auth-alert" data-auth-message hidden></div>
          <label class="auth-field">
            <span>邮箱</span>
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" />
          </label>
          <button class="auth-submit" data-auth-submit type="submit">发送重置邮件</button>
          <div class="auth-foot-links">
            <a data-auth-link href="/login">返回登录</a>
          </div>
        </form>
      </section>
    </main>
    <script src="/vendor/supabase.js?v=20260617"></script>
    <script type="module" src="/supabase-auth.js?v=20260617-local-auth"></script>
    <script type="module" src="/auth-pages.js?v=20260617-redirect-fix"></script>
  </body>
</html>
